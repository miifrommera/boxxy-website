<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxxy Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bulma-primary: #89b4fa;
            --bulma-link: #89b4fa;
        }
        html, body {
            background-color: #11111b !important;
            font-family: 'Lexend', sans-serif;
            color: #cdd6f4;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .navbar {
            background-color: #11111b !important;
            border-bottom: none;
        }
        .navbar-item, .navbar-link {
            color: #cdd6f4 !important;
        }
        .navbar-brand .navbar-item {
            background-color: #1e1e2e;
            border: 2px solid #a6e3a1; /* Catppuccin Green */
            border-radius: 8px;
            padding: 0.5rem 1rem;
            margin: 0.5rem;
            font-weight: 800;
            color: #f5e0dc !important;
            box-shadow: 1px 1px 0 #a6e3a1, 2px 2px 0 #a6e3a1, 3px 3px 0 #a6e3a1;
            transform: translate(-2px, -2px);
            transition: all 0.1s ease-out;
        }
        .navbar-brand .navbar-item:hover {
            transform: translate(0, 0);
            box-shadow: 1px 1px 0 #a6e3a1;
        }
        .footer {
            background-color: #11111b !important;
            color: #a6adc8;
            border-top: none;
            padding: 3rem 1.5rem;
        }
        .fancy-box {
            background-color: #1e1e2e;
            border: 3px solid #f9e2af; /* Catppuccin Yellow */
            border-radius: 16px;
            box-shadow: 1px 1px 0 #f9e2af, 2px 2px 0 #f9e2af, 3px 3px 0 #f9e2af, 4px 4px 0 #f9e2af, 5px 5px 0 #f9e2af, 6px 6px 0 #f9e2af;
            transform: translate(-4px, -4px);
            transition: all 0.2s ease-out;
        }
        .fancy-box:hover {
            transform: translate(0, 0);
            box-shadow: 1px 1px 0 #f9e2af, 2px 2px 0 #f9e2af;
        }
        .sidebar {
            background-color: #1e1e2e;
            padding: 2rem;
            border-radius: 16px;
            border: 2px solid #313244;
            min-height: calc(100vh - 200px);
        }
        .sidebar-title {
            color: #f38ba8 !important;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem !important;
            font-size: 0.9rem;
        }
        .menu-list a {
            color: #cdd6f4 !important;
            border-radius: 8px;
            margin-bottom: 2px;
            padding: 0.5rem 0.75rem;
        }
        .menu-list a:hover {
            background-color: #313244 !important;
            color: #89b4fa !important;
        }
        .menu-list a.is-active {
            background-color: #89b4fa !important;
            color: #11111b !important;
            font-weight: 700;
        }
        .content-area {
            background-color: #1e1e2e;
            padding: 3rem;
            border-radius: 16px;
            border: 2px solid #313244;
        }
        .content-area h1 { color: #f5e0dc !important; }
        .content-area h2 { color: #f2cdcd !important; }
        .content-area h3 { color: #f9e2af !important; }
        .content-area p { line-height: 1.8; margin-bottom: 1.5rem; }
        pre {
            background-color: transparent !important;
            color: #cdd6f4 !important;
            border: none !important;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            font-size: 1.1rem;
            overflow-x: auto;
            margin: 0 !important;
        }
        code {
            background-color: transparent !important;
            color: inherit !important;
        }
        .installation-code {
            max-width: 900px;
            margin: 3rem auto;
        }
        .title {
            color: #f5e0dc !important;
        }
        .subtitle {
            color: #bac2de !important;
        }
        .boxy-badge {
            display: inline-flex;
            align-items: center;
            background-color: #1e1e2e;
            border: 3px solid #f38ba8;
            border-radius: 12px;
            padding: 0.75rem 1.5rem 0.75rem 0.75rem;
            box-shadow: 1px 1px 0 #f38ba8, 2px 2px 0 #f38ba8, 3px 3px 0 #f38ba8, 4px 4px 0 #f38ba8, 5px 5px 0 #f38ba8, 6px 6px 0 #f38ba8, 7px 7px 0 #f38ba8, 8px 8px 0 #f38ba8;
            margin-bottom: 2.5rem;
            margin-left: 4px;
            transform: translate(-4px, -4px);
            transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
            user-select: none;
        }
        .boxy-badge:hover {
            transform: translate(0, 0);
            box-shadow: 1px 1px 0 #f38ba8;
        }
        .boxy-badge img {
            width: 75px;
            height: auto;
            margin-right: 1.25rem;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
        }
        .boxy-badge-text {
            font-size: 1.5rem;
            font-weight: 800;
            color: #f5e0dc;
            line-height: 1.1;
        }
        .boxy-badge-text .feat {
            font-size: 0.8rem;
            display: block;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #a6adc8;
            margin-bottom: 2px;
            font-weight: 600;
        }
        .boxy-badge-text .highlight {
            color: #f38ba8;
        }
        .fancy-title {
            color: #f5e0dc !important;
            line-height: 1.3;
            letter-spacing: -1px;
        }
        .fancy-title .gradient-text {
            background: linear-gradient(135deg, #f38ba8 0%, #cba6f7 50%, #89b4fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            font-weight: 900;
        }
        .fancy-title .accent-text {
            color: #a6e3a1; /* Catppuccin Green */
        }
        .hero-box {
            background-color: #1e1e2e;
            border: 3px solid #cba6f7; /* Catppuccin Mauve */
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 1px 1px 0 #cba6f7, 2px 2px 0 #cba6f7, 3px 3px 0 #cba6f7, 4px 4px 0 #cba6f7, 5px 5px 0 #cba6f7, 6px 6px 0 #cba6f7, 7px 7px 0 #cba6f7, 8px 8px 0 #cba6f7, 9px 9px 0 #cba6f7, 10px 10px 0 #cba6f7, 11px 11px 0 #cba6f7, 12px 12px 0 #cba6f7;
            transform: translate(-6px, -6px);
            transition: all 0.2s ease-out;
        }
        .hero-box:hover {
            transform: translate(0, 0);
            box-shadow: 1px 1px 0 #cba6f7, 2px 2px 0 #cba6f7;
        }
        .boxy-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #1e1e2e;
            border: 3px solid #89b4fa; /* Catppuccin Blue */
            border-radius: 12px;
            padding: 0.8rem 1.8rem;
            font-family: 'Lexend', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #f5e0dc;
            box-shadow: 1px 1px 0 #89b4fa, 2px 2px 0 #89b4fa, 3px 3px 0 #89b4fa, 4px 4px 0 #89b4fa;
            transform: translate(-3px, -3px);
            transition: all 0.1s ease-out;
            cursor: pointer;
            text-decoration: none !important;
        }
        .boxy-button:hover {
            transform: translate(0, 0);
            box-shadow: 1px 1px 0 #89b4fa;
        }
        .boxy-button.is-alt {
            border-color: #cba6f7; /* Mauve */
            box-shadow: 1px 1px 0 #cba6f7, 2px 2px 0 #cba6f7, 3px 3px 0 #cba6f7, 4px 4px 0 #cba6f7;
        }
        .boxy-button.is-alt:hover {
            box-shadow: 1px 1px 0 #cba6f7;
        }
    </style>
</head>
<body>
    <header class="navbar is-dark">
        <div class="container">
            <div class="navbar-brand">
                <a class="navbar-item" href="/">
                    <strong>Boxxy Terminal</strong>
                </a>
            </div>
            <div class="navbar-end">
                <div class="navbar-item">
                    <a class="github-button" href="https://github.com/miifrommera/boxxy" data-icon="octicon-star" data-size="large" data-show-count="true" aria-label="Star miifrommera/boxxy on GitHub">Star</a>
                </div>
            </div>
        </div>
    </header>

    
<section class="section">
    <div class="container">
        <div class="columns">
            <!-- Sidebar Navigation -->
            <aside class="column is-3">
                <div class="sidebar">
                    <p class="sidebar-title">Getting Started</p>
                    <ul class="menu-list mb-5">
                        <li><a href="/getting-started/intro" class="">Introduction</a></li>
                    </ul>

                    <p class="sidebar-title">Features</p>
                    <ul class="menu-list mb-5">
                        <li><a href="/features/core" class="is-active">Core Features</a></li>
                    </ul>

                    <p class="sidebar-title">What Boxxy Can Do</p>
                    <ul class="menu-list">
                        <li><a href="/what-boxxy-can-do/use-cases" class="">Use Cases</a></li>
                    </ul>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="column is-9">
                <div class="content content-area">
                    
                        <h1 id="core-features">Core Features</h1>
<p>This page is not ready yet!</p>

                    
                </div>
            </main>
        </div>
    </div>
</section>


    <footer class="footer">
    </footer>
    <script async defer src="https://buttons.github.io/buttons.js"></script>
</body>
</html>
