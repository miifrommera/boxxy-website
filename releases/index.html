    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="/css/style.css">

<body>
    <header class="navbar is-dark">
        <div class="container">
            <div class="navbar-brand">
                <div class="navbar-item">
                    <a class="boxxy-brand-button" href="/">
                        <strong>Boxxy Terminal</strong>
                    </a>
                </div>
            </div>
            <div class="navbar-end" style="gap: 1rem; align-items: center; display: flex;">
                <div class="navbar-item" style="padding: 0;">
                    <a class="boxxy-live-button" href="/live">
                        <span style="width: 8px; height: 8px; background-color: #f38ba8; border-radius: 50%; display: inline-block; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; border: 1.5px solid #11111b;"></span>
                        <span>Live</span>
                    </a>
                </div>
                <div class="navbar-item" style="padding: 0;">
                    <a class="boxxy-github-button" href="https://github.com/miifrommera/boxxy" target="_blank">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        <span>Star</span>
                        <span class="star-count" id="github-stars">...</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    
<section class="section">
    <div class="container">
        <div class="columns">
            <!-- Sidebar Navigation (Same as docs.html) -->
            <aside class="column is-3">
                <div class="sidebar">
                    <p class="sidebar-title">Getting Started</p>
                    <ul class="menu-list mb-5">
                        <li><a href="/getting-started" class="">Getting Started</a></li>
                        <li><a href="/how-it-works" class="">How It Works</a></li>
                        <li><a href="/development" class="">Development</a></li>
                        <li><a href="/telemetry" class="">Telemetry</a></li>
                    </ul>

                    <p class="sidebar-title">What Boxxy Can Do</p>
                    <ul class="menu-list mb-5">
                        <li><a href="/features" class="">Features</a></li>
                        <li><a href="/use-cases" class="">Use Cases</a></li>
                    </ul>

                    <p class="sidebar-title">Community</p>
                    <ul class="menu-list">
                        <li><a href="/releases" class="is-active">Releases</a></li>
                        <li><a href="/live" class="" style="display: flex; align-items: center; gap: 0.5rem;">
                            Dashboard
                            <span style="background-color: #f38ba8; color: #11111b; font-size: 0.6rem; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;">Live</span>
                        </a></li>
                    </ul>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="column is-9">
                <div class="content content-area" style="background: transparent; border: none; padding-top: 0; padding-bottom: 0;">

                    <div id="loading-state" class="has-text-centered my-6 py-6">
                        <p class="subtitle is-4" style="color: #a6adc8; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;">Fetching releases...</p>
                        <style>
                            @keyframes pulse {
                                0%, 100% { opacity: 1; }
                                50% { opacity: .5; }
                            }
                        </style>
                    </div>

                    <div id="releases-container" style="display: none;">
                        <!-- Populated by JS -->
                    </div>

                    <div class="has-text-centered mt-5 mb-6" id="load-more-container" style="display: none;">
                        <button id="load-more-btn" class="boxxy-button is-alt">Load Older Releases</button>
                    </div>

                    <div id="error-state" class="has-text-centered my-6 py-6" style="display: none;">
                        <p class="subtitle is-4" style="color: #f38ba8;">Failed to load releases. Please try again later.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>
</section>

<!-- Marked JS for Markdown Parsing -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const repo = 'miifrommera/boxxy';
        const container = document.getElementById('releases-container');
        const loading = document.getElementById('loading-state');
        const error = document.getElementById('error-state');
        const loadMoreBtn = document.getElementById('load-more-btn');
        const loadMoreContainer = document.getElementById('load-more-container');

        let allValidReleases = [];
        let displayedCount = 0;
        const pageSize = 10;
        let currentPage = 1;
        let hasMoreFromApi = true;

        async function fetchNextBatch() {
            try {
                loadMoreBtn.classList.add('is-loading');
                loadMoreBtn.disabled = true;

                // Only fetch more from API if we don't have enough valid releases buffered
                while (hasMoreFromApi && (allValidReleases.length - displayedCount) < pageSize) {
                    const response = await fetch(`https://api.github.com/repos/${repo}/releases?per_page=30&page=${currentPage}`);
                    if (!response.ok) throw new Error('Network error');
                    const data = await response.json();

                    if (data.length === 0) {
                        hasMoreFromApi = false;
                    } else {
                        const valid = data.filter(r => !(r.name && r.name.toLowerCase().includes('nightly')) && !(r.tag_name && r.tag_name.toLowerCase().includes('nightly')));

                        // Prevent duplicates just in case
                        valid.forEach(v => {
                            if (!allValidReleases.find(existing => existing.id === v.id)) {
                                allValidReleases.push(v);
                            }
                        });

                        if (data.length < 30) hasMoreFromApi = false;
                        currentPage++; // Always increment page if we got data
                    }
                }

                renderNextPage();
            } catch (err) {
                console.error('Failed to fetch more releases:', err);
                error.style.display = 'block';
            } finally {
                loadMoreBtn.classList.remove('is-loading');
                loadMoreBtn.disabled = false;
            }
        }

        function renderNextPage() {
            const nextBatch = allValidReleases.slice(displayedCount, displayedCount + pageSize);

            nextBatch.forEach((release, index) => {
                const isLatest = displayedCount === 0 && index === 0;

                const releaseDate = new Date(release.published_at).toLocaleDateString('en-US', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });

                const releaseEl = document.createElement('div');
                releaseEl.className = 'content-area mb-6 p-6'; // ensuring original class names

                if (isLatest) {
                    releaseEl.style.borderColor = '#cba6f7';
                    releaseEl.style.boxShadow = '0 0 15px rgba(203, 166, 247, 0.1)';
                }

                const bodyHtml = marked.parse(release.body || '');

                releaseEl.innerHTML = `
                    <div class="is-flex is-justify-content-space-between is-align-items-center mb-4 flex-wrap">
                        <h2 class="title is-3 mb-0" style="color: #f5e0dc !important; display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem;">
                            ${release.name || release.tag_name}
                            ${isLatest && !release.prerelease ? '<span class="tag is-primary is-light" style="background-color: #cba6f7; color: #11111b; font-weight: 800;">LATEST</span>' : ''}
                            ${release.prerelease ? '<span class="tag is-warning is-light" style="background-color: #f9e2af; color: #11111b; font-weight: 800;">PRE-RELEASE</span>' : ''}
                        </h2>
                        <span style="color: #6c7086; font-weight: 600; font-family: 'JetBrains Mono', monospace;">${releaseDate}</span>
                    </div>
                    <div class="release-body content" style="color: #cdd6f4;">
                        ${bodyHtml}
                    </div>
                    <div class="mt-4" style="border-top: 1px solid #313244; padding-top: 1rem;">
                        <a href="${release.html_url}" target="_blank" style="color: #89b4fa; font-weight: 700; text-decoration: none;">View on GitHub →</a>
                    </div>
                `;
                container.appendChild(releaseEl);
            });

            displayedCount += nextBatch.length;

            if (displayedCount >= allValidReleases.length && !hasMoreFromApi) {
                loadMoreContainer.style.display = 'none';
            } else {
                loadMoreContainer.style.display = 'block';
            }
        }

        try {
            await fetchNextBatch();

            if (displayedCount === 0) {
                loading.innerHTML = '<p class="subtitle is-4" style="color: #a6adc8;">No stable releases found.</p>';
                return;
            }

            loading.style.display = 'none';
            container.style.display = 'block';

            loadMoreBtn.addEventListener('click', fetchNextBatch);

        } catch (err) {
            console.error('Failed to fetch releases:', err);
            loading.style.display = 'none';
            error.style.display = 'block';
        }
    });
</script>

<style>
    .release-body h1, .release-body h2, .release-body h3 { color: #f5e0dc !important; margin-top: 1.5rem !important; margin-bottom: 1rem !important; }
    .release-body ul { list-style: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
    .release-body li { margin-bottom: 0.5rem; }
    .release-body code { background-color: #313244 !important; color: #89b4fa !important; padding: 0.1rem 0.3rem !important; border-radius: 4px !important; }
    .release-body a { color: #89b4fa !important; }
    .release-body hr { background-color: #313244; height: 1px; margin: 1.5rem 0; }
    .flex-wrap { flex-wrap: wrap; gap: 0.5rem; }
</style>

</html>
