<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/dev.boxxy.BoxxyTerminal.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="navbar is-dark">
        <div class="container">
            <div class="navbar-brand">
                <div class="navbar-item">
                    <a class="boxxy-brand-button" href="/">
                        <strong>Boxxy Terminal</strong>
                    </a>
                </div>
            </div>
            <div class="navbar-end" style="gap: 1rem; align-items: center; display: flex;">
                <div class="navbar-item" style="padding: 0;">
                    <a class="boxxy-live-button" href="/live">
                        <span style="width: 8px; height: 8px; background-color: #f38ba8; border-radius: 50%; display: inline-block; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; border: 1.5px solid #11111b;"></span>
                        <span>Live</span>
                    </a>
                </div>
                <div class="navbar-item" style="padding: 0;">
                    <a class="boxxy-github-button" href="https://github.com/miifrommera/boxxy" target="_blank">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        <span>Star</span>
                        <span class="star-count" id="github-stars">...</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    {% block content %}
    {% endblock content %}

    <footer class="footer">
    </footer>
    <script src="/js/main.js"></script>
</body>
</html>
